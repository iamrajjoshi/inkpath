name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to retry
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: read

jobs:
  verify:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check the release tag
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "${RELEASE_TAG}" = "v${package_version}"

      - run: pnpm verify

      - name: Pack the verified release
        run: |
          package_version="$(node -p "require('./package.json').version")"
          archive="inkpath-${package_version}.tgz"
          mkdir -p release
          npm pack --pack-destination release
          test -f "release/${archive}"
          cd release
          shasum -a 256 "${archive}" > checksums.txt
          shasum -a 256 -c checksums.txt

      - name: Check the packed release
        run: |
          package_version="$(node -p "require('./package.json').version")"
          pnpm package:check "release/inkpath-${package_version}.tgz"

      - name: Upload the verified release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          archive: true
          name: npm-package-${{ env.RELEASE_TAG }}
          path: |
            release/*.tgz
            release/checksums.txt
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: verify
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download the verified release
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: error
          name: npm-package-${{ env.RELEASE_TAG }}
          path: release

      - name: Verify the prepared archive
        run: |
          version="${RELEASE_TAG#v}"
          archive="inkpath-${version}.tgz"
          test -f "release/${archive}"
          test "$(wc -l < release/checksums.txt | tr -d ' ')" = "1"
          test "$(awk '{ print $2 }' release/checksums.txt)" = "${archive}"
          cd release
          shasum -a 256 -c checksums.txt

      - name: Publish the prepared archive to npm
        run: |
          version="${RELEASE_TAG#v}"
          archive="./release/inkpath-${version}.tgz"
          if npm view "inkpath@${version}" version >/dev/null 2>&1; then
            echo "inkpath@${version} is already published."
          else
            npm publish --ignore-scripts --provenance "${archive}"
          fi

      - name: Verify the registry archive
        run: |
          version="${RELEASE_TAG#v}"
          expected_sha="$(cut -d ' ' -f 1 release/checksums.txt)"
          registry_archive="release/registry.tgz"
          for attempt in 1 2 3 4 5 6; do
            archive_url="$(npm view "inkpath@${version}" dist.tarball 2>/dev/null || true)"
            if [ -n "${archive_url}" ] && curl -fsSL "${archive_url}" -o "${registry_archive}"; then
              break
            fi
            if [ "${attempt}" = "6" ]; then
              exit 1
            fi
            sleep 5
          done
          actual_sha="$(shasum -a 256 "${registry_archive}" | cut -d ' ' -f 1)"
          test "${actual_sha}" = "${expected_sha}"

  github-release:
    needs: publish
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download the published release
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: error
          name: npm-package-${{ env.RELEASE_TAG }}
          path: release

      - name: Verify the release archive
        run: |
          version="${RELEASE_TAG#v}"
          archive="inkpath-${version}.tgz"
          test -f "release/${archive}"
          test "$(wc -l < release/checksums.txt | tr -d ' ')" = "1"
          test "$(awk '{ print $2 }' release/checksums.txt)" = "${archive}"
          cd release
          shasum -a 256 -c checksums.txt

      - name: Create the GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release/*.tgz release/checksums.txt --clobber
          else
            gh release create "${RELEASE_TAG}" release/*.tgz release/checksums.txt \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
